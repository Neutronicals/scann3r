name: "Open Redirect"
category: "openredirect"
severity: "medium"
payloads:
  - value: "https://evil.com"
    detection: "redirect"
  - value: "//evil.com"
    detection: "redirect"
  - value: "///evil.com"
    detection: "redirect"
  - value: "\\/\\/evil.com"
    detection: "redirect"
  - value: "/\\evil.com"
    detection: "redirect"
  - value: "https://evil.com%2f%2f"
    detection: "redirect"
  - value: "https://evil.com@legitimate.com"
    detection: "redirect"
  - value: "javascript:alert(1)//"
    detection: "reflected"
  - value: "//evil.com/%2f.."
    detection: "redirect"
  - value: "https:evil.com"
    detection: "redirect"
  - value: "http://evil.com"
    detection: "redirect"
  - value: "/%09/evil.com"
    detection: "redirect"
  - value: "/%5cevil.com"
    detection: "redirect"
  - value: "/evil.com"
    detection: "redirect"
  - value: ".evil.com"
    detection: "redirect"

indicators:
  - "evil.com"
  - "Location:"
  - "301"
  - "302"
  - "303"
  - "307"
  - "308"
