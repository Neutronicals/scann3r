name: "Command Injection"
category: "cmdi"
severity: "critical"
payloads:
  - value: ";id"
    detection: "error_based"
  - value: "|id"
    detection: "error_based"
  - value: "||id"
    detection: "error_based"
  - value: "&&id"
    detection: "error_based"
  - value: ";ls -la"
    detection: "error_based"
  - value: "|ls -la"
    detection: "error_based"
  - value: "$(id)"
    detection: "error_based"
  - value: "`id`"
    detection: "error_based"
  - value: ";cat /etc/passwd"
    detection: "error_based"
  - value: "|cat /etc/passwd"
    detection: "error_based"
  - value: ";whoami"
    detection: "error_based"
  - value: "| whoami"
    detection: "error_based"
  - value: "& whoami"
    detection: "error_based"
  - value: ";uname -a"
    detection: "error_based"
  - value: "| ping -c 5 127.0.0.1"
    detection: "time_based"
  - value: "& ping -n 5 127.0.0.1"
    detection: "time_based"
  - value: ";sleep 5"
    detection: "time_based"
  - value: "|sleep 5"
    detection: "time_based"
  - value: "$(sleep 5)"
    detection: "time_based"
  - value: "`sleep 5`"
    detection: "time_based"
  - value: "| ping -c 5 127.0.0.1 |"
    detection: "time_based"

indicators:
  - "uid="
  - "gid="
  - "root:x:0"
  - "bin/bash"
  - "bin/sh"
  - "/etc/passwd"
  - "Linux"
  - "Darwin"
  - "MINGW"
  - "Windows"
  - "command not found"
  - "not recognized as"
  - "Permission denied"
  - "No such file"
  - "total "
  - "drwx"
